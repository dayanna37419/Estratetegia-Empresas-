<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGE Enterprise | Executive Strategy Dashboard</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        /* --- SISTEMA DE DISEÑO & VARIABLES DE ESTADO --- */
        :root {
            --bg-main: #f8fafc;
            --bg-sidebar: #0f172a;
            --sidebar-text: #94a3b8;
            --sidebar-active: #38bdf8;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --accent-color: #2563eb;
            --accent-hover: #1d4ed8;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --radius-lg: 12px;
            --radius-md: 8px;
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.05), 0 2px 4px -2px rgb(0 0 0 / 0.05);
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="dark"] {
            --bg-main: #0b0f19;
            --bg-sidebar: #030712;
            --card-bg: #111827;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --border-color: #374151;
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.3);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-main); color: var(--text-main); display: flex; min-height: 100vh; overflow-x: hidden; transition: background-color 0.3s ease; }

        /* --- LAYOUT: SIDEBAR CORPORATIVO --- */
        #sidebar { width: 280px; background-color: var(--bg-sidebar); color: #ffffff; display: flex; flex-direction: column; position: fixed; top: 0; bottom: 0; left: 0; z-index: 50; transition: var(--transition); border-right: 1px solid rgba(255, 255, 255, 0.05); }
        #sidebar.collapsed { width: 75px; }
        #sidebar.collapsed .nav-text, #sidebar.collapsed .brand-name, #sidebar.collapsed .sidebar-footer { display: none; }
        
        .brand-area { height: 70px; display: flex; align-items: center; padding: 0 24px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .brand-name { font-weight: 700; font-size: 1.1rem; letter-spacing: -0.5px; color: #f8fafc; margin-left: 12px; }
        
        .nav-links { list-style: none; padding: 20px 12px; overflow-y: auto; flex-grow: 1; }
        .nav-item { display: flex; align-items: center; padding: 12px 16px; color: var(--sidebar-text); text-decoration: none; border-radius: var(--radius-md); margin-bottom: 6px; cursor: pointer; transition: var(--transition); }
        .nav-item:hover, .nav-item.active { background-color: rgba(255, 255, 255, 0.04); color: var(--sidebar-active); }
        .nav-item svg { width: 20px; height: 20px; flex-shrink: 0; }
        .nav-text { margin-left: 14px; font-size: 0.9rem; font-weight: 500; }
        .sidebar-footer { padding: 20px; border-top: 1px solid rgba(255, 255, 255, 0.05); font-size: 0.75rem; color: var(--sidebar-text); text-align: center; }

        /* --- CONTENEDORES Y NAVEGACIÓN SPA --- */
        #main-container { flex-grow: 1; margin-left: 280px; padding: 100px 40px 40px 40px; transition: var(--transition); min-width: 0; }
        #main-container.expanded { margin-left: 75px; }
        
        #topbar { position: fixed; top: 0; right: 0; left: 280px; height: 70px; background-color: var(--card-bg); border-bottom: 1px solid var(--border-color); display: flex; align-items: center; justify-content: space-between; padding: 0 40px; z-index: 40; transition: var(--transition); box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05); }
        #topbar.expanded { left: 75px; }
        
        .topbar-left { display: flex; align-items: center; gap: 20px; }
        .topbar-right { display: flex; align-items: center; gap: 12px; }

        /* --- BOTONES PREMIUM & CONTROLES --- */
        .btn { display: inline-flex; align-items: center; gap: 8px; padding: 9px 16px; border-radius: var(--radius-md); font-weight: 500; font-size: 0.85rem; cursor: pointer; border: 1px solid transparent; transition: var(--transition); user-select: none; }
        .btn-primary { background-color: var(--accent-color); color: white; }
        .btn-primary:hover { background-color: var(--accent-hover); }
        .btn-secondary { background-color: transparent; border-color: var(--border-color); color: var(--text-main); }
        .btn-secondary:hover { background-color: var(--bg-main); border-color: var(--text-muted); }
        .btn-danger { background-color: var(--danger); color: white; }
        
        .btn-icon { padding: 10px; border-radius: var(--radius-md); border: 1px solid var(--border-color); cursor: pointer; background: var(--card-bg); display: flex; align-items: center; justify-content: center; transition: var(--transition); }
        .btn-icon:hover { background-color: var(--bg-main); }
        .btn-icon svg { width: 18px; height: 18px; stroke: var(--text-main); fill: none; }

        /* --- ESTRUCTURAS DE SECCIÓN & GRID --- */
        .dashboard-section { display: none; animation: fadeIn SPA 0.3s ease; }
        .dashboard-section.active { display: block; }
        @keyframes fadeInSPA { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

        .section-header { margin-bottom: 24px; display: flex; justify-content: space-between; align-items: center; }
        .section-title { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.5px; color: var(--text-main); }

        .grid-2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(450px, 1fr)); gap: 24px; margin-bottom: 24px; }
        .grid-3 { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 24px; margin-bottom: 24px; }
        .grid-4 { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 24px; }

        .card { background-color: var(--card-bg); border-radius: var(--radius-lg); border: 1px solid var(--border-color); padding: 24px; box-shadow: var(--shadow-md); position: relative; }
        .card-header-area { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; border-bottom: 1px solid var(--border-color); padding-bottom: 12px; }
        .card-title { font-size: 1rem; font-weight: 600; color: var(--text-main); }

        /* --- MOTOR DE EDICIÓN IN-PLACE CORPORATIVO --- */
        [contenteditable="true"] { padding: 4px 8px; border-radius: var(--radius-md); outline: none; transition: var(--transition); }
        [contenteditable="true"]:hover { background-color: rgba(37, 99, 235, 0.04); }
        [contenteditable="true"]:focus { background-color: var(--card-bg); box-shadow: 0 0 0 2px var(--accent-color); }

        /* --- SEMÁFOROS, BADGES Y BARRAS DE PROGRESO --- */
        .badge { display: inline-block; padding: 4px 8px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; text-align: center; }
        .badge-success { background-color: rgba(16, 185, 129, 0.12); color: var(--success); }
        .badge-warning { background-color: rgba(245, 158, 11, 0.12); color: var(--warning); }
        .badge-danger { background-color: rgba(239, 68, 6
